<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fff0f9;
            font-family: Arial;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #ff0095;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 120px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        #result {
            margin-top: 15px;
            color: #d63384;
        }
    </style>

</head>
<body>

<div class="box">

    <h2>เครื่องคิดเลข</h2>

    <input type="number" id="num1" placeholder="เลขที่ 1">
    <input type="number" id="num2" placeholder="เลขที่ 2"><br><br>

    <button onclick="calc('+')">+</button>
    <button onclick="calc('-')">-</button>
    <button onclick="calc('*')">*</button>
    <button onclick="calc('/')">/</button>
    <button onclick="clearAll()">Clear</button>

    <h2 id="result"></h2>

</div>

<script>
    function calc(op) {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        if (n1 === "" || n2 === "") {
            alert("กรุณากรอกข้อมูลให้ครบ");
            return;
        }

        n1 = Number(n1);
        n2 = Number(n2);

        let res;

        if (op === "+") res = n1 + n2;
        else if (op === "-") res = n1 - n2;
        else if (op === "*") res = n1 * n2;
        else if (op === "/") {
            if (n2 === 0) {
                alert("ห้ามหารด้วย 0");
                return;
            }
            res = n1 / n2;
        }

        document.getElementById("result").innerHTML = "ผลลัพธ์: " + res;
    }

    function clearAll() {
        document.getElementById("num1").value = "";
        document.getElementById("num2").value = "";
        document.getElementById("result").innerHTML = "";
    }
</script>

</body>
</html>
