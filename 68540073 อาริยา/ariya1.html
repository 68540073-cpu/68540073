<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตารางสูตรคูณ</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ffe6f0;
            font-family: Arial;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: rgb(255, 0, 98);
        }

        label {
            color: rgb(255, 89, 139);
        }

        input {
            padding: 8px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            background-color: rgb(255, 0, 98);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(200, 0, 70);
        }

        #result {
            color: rgb(255, 98, 164);
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>โปรแกรมตารางสูตรคูณ (5 - 18)</h2>

    <label>กรอกตัวเลข: </label>
    <input type="number" id="num">
    <br>

    <button onclick="showTable()">แสดงผล</button>

    <div id="result"></div>

</div>

<script>
    function showTable() {
        let n = document.getElementById("num").value;

        if (n === "") {
            alert("กรุณากรอกตัวเลข");
            return;
        }

        let output = "";

        for (let i = 5; i <= 18; i++) {
            output += n + " x " + i + " = " + (n * i) + "<br>";
        }

        document.getElementById("result").innerHTML = output;
    }
</script>

</body>
</html>
